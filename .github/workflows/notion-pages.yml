name: Sync Notion glossary and deploy

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read glossary from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          OUTPUT_PATH: public/glossary.json
        run: python sync_from_notion.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload glossary
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy glossary
        id: deployment
        uses: actions/deploy-pages@v4
